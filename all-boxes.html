<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כל הקופסאות · Sweet Box</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #B5DCE8;
  --blue-deep: #5B9DB5;
  --blue-soft: #EDF6FA;
  --teal-accent: #4A8FA8;
  --ink: #1A1A1F;
  --ink-soft: #4D5258;
  --ink-whisper: #8A8E96;
  --cream: #FFFFFF;
  --brown: #554B41;
  --paper: #FFFFFF;
  --line: #E8EAED;
  --success: #6B8E5C;
}

html, body {
  font-family: 'Heebo', sans-serif;
  color: var(--ink);
  background: var(--paper);
  direction: rtl;
  -webkit-font-smoothing: antialiased;
  line-height: 1.6;
}
a { color: inherit; text-decoration: none; }

/* === TOP BAR === */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 14px 32px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0,0,0,0.05);
}
.topbar > *:first-child { justify-self: start; }
.topbar > *:last-child { justify-self: end; }
.topbar .logo { justify-self: center; }
.topbar .logo img { height: 56px; display: block; }
.topbar-side { display: flex; align-items: center; gap: 14px; }
.cart-icon-btn {
  position: relative;
  width: 42px; height: 42px;
  border-radius: 50%;
  background: white;
  border: 1.5px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.3s, transform 0.2s;
}
.cart-icon-btn:hover { border-color: var(--blue-deep); transform: translateY(-1px); }
.cart-icon-btn svg { width: 18px; height: 18px; color: var(--brown); }
.cart-icon-btn .cart-badge {
  position: absolute; top: -4px; inset-inline-start: -4px;
  min-width: 20px; height: 20px;
  border-radius: 999px;
  background: var(--teal-accent); color: white;
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  padding: 0 5px;
}
.topbar .cta-bulk {
  background: transparent;
  border: 1.5px solid var(--teal-accent);
  color: var(--teal-accent);
  padding: 10px 22px;
  font-size: 12px; letter-spacing: 2px;
  font-weight: 500; border-radius: 999px;
  transition: background 0.3s, color 0.3s, transform 0.2s;
}
.topbar .cta-bulk:hover { background: var(--teal-accent); color: #FFF; transform: translateY(-1px); }
.topbar .cta {
  background: var(--teal-accent); color: #FFF;
  padding: 10px 22px;
  font-size: 12px; letter-spacing: 2px;
  font-weight: 500; border-radius: 999px;
  transition: background 0.3s, transform 0.2s;
}
.topbar .cta:hover { background: var(--brown); transform: translateY(-1px); }

/* === BREADCRUMB === */
.breadcrumb {
  padding: 100px 32px 8px;
  font-weight: 300;
  font-size: 13.5px;
  color: var(--brown);
  letter-spacing: 1px;
  max-width: 1280px;
  margin: 0 auto;
}
.breadcrumb a { color: var(--blue-deep); }
.breadcrumb .sep { margin: 0 8px; color: var(--ink-whisper); }

/* === HERO === */
.boxes-hero {
  text-align: center;
  padding: 14px 24px 22px;
  max-width: 720px;
  margin: 0 auto;
}
.boxes-hero .eyebrow {
  font-size: 12px;
  letter-spacing: 5px;
  color: var(--teal-accent);
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.boxes-hero h1 {
  font-size: clamp(32px, 5vw, 46px);
  font-weight: 900;
  color: var(--brown);
  letter-spacing: 0.3px;
  line-height: 1.1;
  margin-bottom: 8px;
}
.boxes-hero p {
  font-size: 14.5px;
  color: var(--ink-soft);
  font-weight: 300;
}

/* === BOXES GRID === */
.boxes-grid-wrap {
  max-width: 1280px;
  margin: 0 auto;
  padding: 6px 24px 60px;
}
.boxes-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
}
.box-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
}
.box-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 24px rgba(0,0,0,0.07);
  border-color: var(--blue-deep);
}
.box-card .box-image {
  aspect-ratio: 1;
  background-size: cover;
  background-position: center;
  background-color: var(--blue-soft);
  position: relative;
  cursor: pointer;
}
.box-card .box-tag {
  position: absolute;
  top: 8px;
  inset-inline-start: 8px;
  background: var(--ink);
  color: white;
  padding: 3px 8px;
  font-size: 9.5px;
  letter-spacing: 1.5px;
  font-weight: 700;
  text-transform: uppercase;
}
.box-card .box-tag.blue { background: var(--blue); color: var(--ink); }
.box-card .box-tag.brown { background: var(--brown); color: white; }
.box-card .box-info {
  padding: 10px 10px 8px;
  text-align: center;
  cursor: pointer;
}
.box-card .box-name {
  font-size: 13.5px;
  font-weight: 700;
  color: var(--brown);
  line-height: 1.2;
  margin-bottom: 3px;
}
.box-card .box-price {
  font-size: 12.5px;
  color: var(--teal-accent);
  font-weight: 600;
}
.box-card .box-ctas {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  padding: 0 8px 10px;
}
.box-card .btn-buy,
.box-card .btn-add {
  padding: 7px 4px;
  font-family: inherit;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.5px;
  border-radius: 999px;
  cursor: pointer;
  transition: background 0.25s, color 0.25s, transform 0.2s;
  border: none;
  white-space: nowrap;
  line-height: 1;
}
.box-card .btn-buy {
  background: var(--teal-accent);
  color: white;
}
.box-card .btn-buy:hover { background: var(--brown); }
.box-card .btn-add {
  background: white;
  color: var(--blue-deep);
  border: 1.5px solid var(--blue-deep);
}
.box-card .btn-add:hover { background: var(--blue-deep); color: white; }
.box-card .btn-add:disabled { opacity: 0.85; cursor: default; }

/* Top-of-grid utility row */
.grid-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--brown);
}
.grid-top .count {
  color: var(--ink-whisper);
  letter-spacing: 1px;
}
.grid-top .back-to-carousel {
  color: var(--blue-deep);
  text-decoration: underline;
  font-weight: 500;
}
.grid-top .back-to-carousel:hover { color: var(--brown); }

/* === FOOTER === */
.footer {
  background: var(--cream);
  padding: 28px 24px 18px;
  border-top: 1px solid var(--line);
}
.footer-top {
  max-width: 1280px;
  margin: 0 auto 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(85,75,65,.12);
  padding-bottom: 14px;
}
.footer-top img { height: 48px; }
.footer-social { display: flex; gap: 12px; }
.footer-social a {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: white;
  border: 1px solid var(--line);
}
.footer-social svg { width: 16px; height: 16px; fill: var(--brown); }
.footer-bottom {
  max-width: 1280px;
  margin: 0 auto;
  text-align: center;
  font-size: 11px;
  color: var(--brown);
  letter-spacing: 2px;
  opacity: 0.6;
}

/* === RESPONSIVE === */
@media (max-width: 1100px) {
  .boxes-grid { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 800px) {
  .boxes-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .box-card .box-info { padding: 8px 6px 6px; }
  .box-card .box-name { font-size: 12px; }
  .box-card .box-price { font-size: 11.5px; }
  .box-card .box-ctas { padding: 0 6px 8px; gap: 3px; }
  .box-card .btn-buy,
  .box-card .btn-add { font-size: 10px; padding: 6px 2px; letter-spacing: 0; }
  .box-card .box-tag { font-size: 8.5px; padding: 2px 6px; letter-spacing: 1px; }
  .boxes-grid-wrap { padding: 6px 14px 40px; }
  .breadcrumb { padding: 96px 16px 6px; font-size: 12.5px; }
  .boxes-hero { padding: 10px 18px 14px; }
  .topbar { padding: 12px 16px; }
  .topbar .logo img { height: 44px; }
  .topbar .cta-bulk, .topbar .cta { padding: 8px 14px; font-size: 11px; letter-spacing: 1.5px; }
  .topbar-side { gap: 8px; }
  .cart-icon-btn { width: 38px; height: 38px; }
}
@media (max-width: 380px) {
  .boxes-grid { grid-template-columns: repeat(2, 1fr); }
  .box-card .box-name { font-size: 13.5px; }
  .box-card .box-price { font-size: 12.5px; }
  .box-card .btn-buy, .box-card .btn-add { font-size: 11.5px; padding: 8px 4px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-side">

<!-- FOOTER -->
<footer class="footer">

<script src="cart-system.js"></script>
<script>
  // All 15 boxes — single source of truth
  const BOXES = [
    { id: 'best-seller-box',  name: 'Best Seller Box',  price: 190, image: 'box-bestseller.jpg', page: 'product-bestseller.html', meta: '6 פריטים אייקוניים', tag: 'Best Seller', tagClass: '' },
    { id: 'dream-box',        name: 'Dream Box',        price: 430, image: 'box-dream.jpg',      page: 'product-dream.html',      meta: '11 פריטים · 26 יח׳',  tag: 'Premium', tagClass: 'blue' },
    { id: 'crack-pie-box',    name: 'Crack Pie Box',    price: 190, image: 'box-crackpie.jpg',   page: 'product-crackpie.html',   meta: 'עוגה שלמה',           tag: 'Fan Favorite', tagClass: '' },
    { id: 'mini-cupcake-box', name: 'Mini Cupcake Box', price: 170, image: 'box-cupcake.jpg',    page: 'product-cupcake.html',    meta: '16 מיני · 4 טעמים',   tag: '', tagClass: '' },
    { id: 'mix-box',          name: 'Mix Box',          price: 220, image: 'box-mix.jpg',        page: 'product-mix.html',        meta: '5 קלאסיקות',          tag: '', tagClass: '' },
    { id: 'premium-box',      name: 'Premium Box',      price: 350, image: 'box-premium.png',    page: 'product-premium.html',    meta: '8 פריטים · 47 יח׳',   tag: 'Premium', tagClass: 'blue' },
    { id: 'party-box',        name: 'Party Box',        price: 300, image: 'box-party.png',      page: 'product-party.html',      meta: '7 פריטים · 30 יח׳',   tag: 'לאירועים', tagClass: '' },
    { id: 'super-box',        name: 'Super Box',        price: 260, image: 'box-super.png',      page: 'product-super.html',      meta: '8 פריטים מגוונים',    tag: '', tagClass: '' },
    { id: 'valentines-box',   name: "Valentine's Box",  price: 250, image: 'box-valentines.png', page: 'product-valentines.html', meta: '6 פריטים · 32 יח׳',   tag: 'Romantic', tagClass: '' },
    { id: 'gift-box',         name: 'Gift Box',         price: 210, image: 'box-gift.png',       page: 'product-gift.html',       meta: '4 פריטים · 28 יח׳',   tag: '', tagClass: '' },
    { id: 'new-york-box',     name: 'New York Box',     price: 180, image: 'box-newyork.png',    page: 'product-newyork.html',    meta: '6 פריטים אמריקאיים',  tag: '', tagClass: '' },
    { id: 'i-love-you-box',   name: 'I Love You Box',   price: 180, image: 'box-iloveyou.png',   page: 'product-iloveyou.html',   meta: '3 רכיבים · 30 יח׳',   tag: 'Love', tagClass: '' },
    { id: 'cream-cake-box',   name: 'Cream Cake Box',   price: 200, image: 'box-creamcake.png',  page: 'product-creamcake.html',  meta: 'עוגה שלמה',           tag: '', tagClass: '' },
    { id: 'vegan-box',        name: 'Vegan Box',        price: 180, image: 'box-vegan.png',      page: 'product-vegan.html',      meta: '4 פריטים טבעוניים',   tag: 'Vegan', tagClass: '' },
    { id: 'cheese-box',       name: 'Cheese Box',       price: 260, image: 'box-cheesy.jpg',     page: 'product-cheesebox.html',  meta: '7 פריטי גבינה',       tag: 'מארז גבינות', tagClass: 'brown' }
  ];

  function escapeHtml(s){
    return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const grid = document.getElementById('boxesGrid');
  grid.innerHTML = BOXES.map((box, idx) => `
    <div class="box-card" data-idx="${idx}">
      <div class="box-image" style="background-image: url('${escapeHtml(box.image)}');" data-page="${escapeHtml(box.page)}">
        ${box.tag ? `<div class="box-tag ${box.tagClass}">${escapeHtml(box.tag)}</div>` : ''}
      </div>
      <div class="box-info" data-page="${escapeHtml(box.page)}">
        <div class="box-name">${escapeHtml(box.name)}</div>
        <div class="box-price">${box.price} ₪</div>
      </div>
      <div class="box-ctas">
        <button class="btn-buy" data-act="buy">קנה</button>
        <button class="btn-add" data-act="add">+ הוסף</button>
      </div>
    </div>
  `).join('');

  // Wire up clicks
  grid.querySelectorAll('.box-card').forEach(card => {
    const idx = parseInt(card.dataset.idx);
    const box = BOXES[idx];

    // Image + info area → go to product page
    card.querySelectorAll('[data-page]').forEach(el => {
      el.addEventListener('click', () => {
        window.location.href = el.dataset.page;
      });
    });

    // Buy now
    card.querySelector('[data-act="buy"]').addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      window.SweetCart.buyNow({
        id: box.id, name: box.name, price: box.price, image: box.image, meta: box.meta
      });
    });

    // Add to cart
    const addBtn = card.querySelector('[data-act="add"]');
    addBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      window.SweetCart.add({
        id: box.id, name: box.name, price: box.price, image: box.image, meta: box.meta, qty: 1
      });
      window.SweetCart.flashAdded(addBtn);
    });
  });
</script>
</body>
